name: CLI Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: Semver version to publish, without leading v
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish-cli:
    name: Publish CLI Packages
    runs-on: macos-14
    timeout-minutes: 60
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Verify npm token
        shell: bash
        run: |
          if [[ -z "${NODE_AUTH_TOKEN}" ]]; then
            echo "Missing NPM_TOKEN secret"
            exit 1
          fi

      - name: Guard publishable CLI tag
        id: publish_guard
        shell: bash
        run: |
          if [[ ! -f "cli/package.json" ]]; then
            echo "publishable=false" >> "$GITHUB_OUTPUT"
            echo "Skipping: cli/package.json missing in this tag"
            exit 0
          fi

          PACKAGE_NAME=$(node -p "require('./cli/package.json').name")
          if [[ "${PACKAGE_NAME}" != "@singyy/viby" ]]; then
            echo "publishable=false" >> "$GITHUB_OUTPUT"
            echo "Skipping: legacy tag for package ${PACKAGE_NAME}"
            exit 0
          fi

          echo "publishable=true" >> "$GITHUB_OUTPUT"
          echo "Publishing package ${PACKAGE_NAME}"

      - name: Resolve version
        if: steps.publish_guard.outputs.publishable == 'true'
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved version: ${VERSION}"

      - name: Resolve npm dist-tag
        if: steps.publish_guard.outputs.publishable == 'true'
        id: dist_tag
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DIST_TAG="latest"
          if [[ "${VERSION}" == *-* ]]; then
            DIST_TAG="next"
          fi
          echo "dist_tag=${DIST_TAG}" >> "$GITHUB_OUTPUT"
          echo "Resolved npm dist-tag: ${DIST_TAG}"

      - name: Verify workspace version
        if: steps.publish_guard.outputs.publishable == 'true'
        shell: bash
        run: |
          ACTUAL_VERSION=$(node -p "require('./cli/package.json').version")
          if [[ "${ACTUAL_VERSION}" != "${{ steps.version.outputs.version }}" ]]; then
            echo "cli/package.json version ${ACTUAL_VERSION} does not match release version ${{ steps.version.outputs.version }}"
            exit 1
          fi

      - name: Install dependencies
        if: steps.publish_guard.outputs.publishable == 'true'
        run: bun install --frozen-lockfile

      - name: Focused CLI verification
        if: steps.publish_guard.outputs.publishable == 'true'
        run: |
          bun run typecheck:cli
          bun run --cwd cli test -- src/bin/vibyBin.test.ts

      - name: Build release binaries
        if: steps.publish_guard.outputs.publishable == 'true'
        run: bun run build:single-exe:all

      - name: Prepare npm packages
        if: steps.publish_guard.outputs.publishable == 'true'
        run: bun run --cwd cli prepare-npm-packages

      - name: Dry-run published main package
        if: steps.publish_guard.outputs.publishable == 'true'
        run: npm publish --dry-run --access public --tag "${{ steps.dist_tag.outputs.dist_tag }}"
        working-directory: cli/npm/main

      - name: Publish CLI packages
        if: steps.publish_guard.outputs.publishable == 'true'
        shell: bash
        run: |
          publish_if_needed() {
            local package_name="$1"
            local package_dir="$2"
            local publish_log

            publish_log=$(mktemp)

            if npm view "${package_name}@${{ steps.version.outputs.version }}" version --registry=https://registry.npmjs.org >/dev/null 2>&1; then
              echo "Skipping ${package_name}@${{ steps.version.outputs.version }}; already published"
              return 0
            fi

            echo "Publishing ${package_name}@${{ steps.version.outputs.version }}"
            if (
              cd "${package_dir}"
              npm publish --access public --tag "${{ steps.dist_tag.outputs.dist_tag }}"
            ) >"${publish_log}" 2>&1; then
              cat "${publish_log}"
              rm -f "${publish_log}"
              return 0
            fi

            cat "${publish_log}"

            if grep -q "previously published versions" "${publish_log}"; then
              echo "Skipping ${package_name}@${{ steps.version.outputs.version }}; npm reports this version already exists"
              rm -f "${publish_log}"
              return 0
            fi

            rm -f "${publish_log}"
            return 1
          }

          publish_if_needed "viby-cli-darwin-arm64" "cli/npm/darwin-arm64"
          publish_if_needed "viby-cli-darwin-x64" "cli/npm/darwin-x64"
          publish_if_needed "viby-cli-linux-arm64" "cli/npm/linux-arm64"
          publish_if_needed "viby-cli-linux-x64" "cli/npm/linux-x64"
          publish_if_needed "viby-cli-windows-x64" "cli/npm/windows-x64"
          publish_if_needed "@singyy/viby" "cli/npm/main"
